<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>엄켓몬 실루엣 퀴즈</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  h1 { font-size: 2rem; margin-bottom: 8px; color: #e94560; }
  .score { font-size: 1.1rem; color: #aaa; margin-bottom: 24px; }

  /* 공통 화면 레이아웃 */
  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  .screen.active { display: flex; }
  .screen h2 { font-size: 1.3rem; color: #ccc; }

  /* 메인 화면 */
  .main-hero { text-align: center; }
  .main-hero h1 { margin-bottom: 4px; }
  .main-sub { color: #888; font-size: 1rem; }
  .main-buttons { display: flex; gap: 16px; margin-top: 8px; }
  .main-leaderboard {
    display: flex; flex-direction: column;
    align-items: center; gap: 12px;
    margin-top: 16px; width: 100%; max-width: 420px;
  }
  .main-leaderboard h2 { font-size: 1.2rem; color: #aaa; }
  .btn-mode {
    font-size: 1.3rem;
    padding: 20px 40px;
    border-radius: 16px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.1s;
    flex: 1;
    text-align: center;
  }
  .main-buttons { max-width: 400px; width: 100%; }
  .btn-mode:active { transform: scale(0.95); }
  .btn-mode.practice { background: #00b894; color: #fff; }
  .btn-mode.ranked { background: #e94560; color: #fff; }
  .btn-mode .mode-desc {
    font-size: 0.75rem;
    font-weight: normal;
    margin-top: 6px;
    opacity: 0.85;
  }

  /* 리더보드 탭 */
  .lb-tabs { display: flex; gap: 8px; }
  .lb-tab {
    font-size: 0.9rem;
    padding: 6px 16px;
    border-radius: 8px;
    border: 2px solid #0f3460;
    background: #16213e;
    color: #888;
    cursor: pointer;
  }
  .lb-tab.active { background: #e94560; border-color: #e94560; color: #fff; }

  /* 설정 화면 */
  .gen-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 400px;
  }
  .gen-btn {
    font-size: 1rem;
    padding: 16px 24px;
    border-radius: 12px;
    border: 2px solid #0f3460;
    background: #16213e;
    color: #888;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    user-select: none;
  }
  .gen-btn:hover { border-color: #e94560; }
  .gen-btn.active { background: #e94560; border-color: #e94560; color: #fff; }
  .gen-btn .gen-range { font-size: 0.75rem; color: #666; margin-top: 4px; }
  .gen-btn.active .gen-range { color: #ffccd5; }
  .select-actions { display: flex; gap: 12px; }
  .btn-select-all {
    background: #0f3460; color: #eee;
    font-size: 0.9rem; padding: 8px 16px;
    border-radius: 8px; border: none; cursor: pointer;
  }
  .mode-select { display: flex; gap: 12px; }
  .mode-btn {
    font-size: 1rem; padding: 12px 24px;
    border-radius: 12px; border: 2px solid #0f3460;
    background: #16213e; color: #888;
    cursor: pointer; transition: all 0.2s;
  }
  .mode-btn.active { background: #e94560; border-color: #e94560; color: #fff; }
  .btn-start {
    background: #00b894; color: #fff;
    font-size: 1.3rem; padding: 14px 48px;
    border-radius: 12px; border: none;
    cursor: pointer; font-weight: bold;
    transition: transform 0.1s;
  }
  .btn-start:active { transform: scale(0.95); }
  .btn-start:disabled { background: #444; cursor: not-allowed; color: #888; }
  .btn-start.ranked-start { background: #e94560; }

  /* 게임 화면 */
  .game-area {
    display: flex; flex-direction: column;
    align-items: center; gap: 10px;
  }
  .image-container {
    width: 320px; height: 320px;
    display: flex; align-items: center; justify-content: center;
    background: #16213e; border-radius: 16px;
    border: 2px solid #0f3460;
    position: relative; overflow: hidden;
  }
  canvas { max-width: 280px; max-height: 280px; }
  .image-container img { max-width: 280px; max-height: 280px; display: none; }
  .loading { color: #555; font-size: 1.2rem; }

  .timer-bar {
    width: 320px; height: 8px;
    background: #0f3460; border-radius: 4px;
    overflow: hidden; display: none;
  }
  .timer-fill {
    height: 100%; background: #00b894;
    border-radius: 4px; transition: width 0.1s linear; width: 100%;
  }
  .timer-fill.danger { background: #e94560; }
  .timer-text { font-size: 0.9rem; color: #aaa; display: none; }

  .input-area { display: flex; gap: 8px; }
  input[type="text"] {
    font-size: 1.2rem; padding: 10px 16px;
    border-radius: 8px; border: 2px solid #0f3460;
    background: #16213e; color: #eee;
    outline: none; width: 220px; text-align: center;
  }
  input[type="text"]:focus { border-color: #e94560; }
  button {
    font-size: 1rem; padding: 10px 20px;
    border-radius: 8px; border: none;
    cursor: pointer; font-weight: bold;
    transition: transform 0.1s;
  }
  button:active { transform: scale(0.95); }
  .btn-submit { background: #e94560; color: #fff; }
  .btn-hint { background: #0f3460; color: #eee; }
  .btn-next { background: #00b894; color: #fff; font-size: 1.2rem; padding: 12px 32px; }
  .btn-skip { background: #636e72; color: #eee; }
  .btn-back {
    background: #636e72; color: #eee;
    font-size: 0.85rem; padding: 8px 16px; margin-top: 16px;
  }
  .result {
    text-align: center; min-height: 60px;
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
  }
  .result .name-reveal { font-size: 1.5rem; font-weight: bold; color: #e94560; }
  .result .name-original { font-size: 1rem; color: #888; }
  .flavor-box { margin-top: 4px; max-width: 360px; text-align: center; line-height: 1.6; }
  .flavor-um { font-size: 0.95rem; color: #ffd32a; font-weight: bold; }
  .hint-text { color: #ffd32a; font-size: 0.95rem; }
  .wrong { animation: shake 0.4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }
  .buttons-row { display: flex; gap: 8px; }
  .gen-info { font-size: 0.85rem; color: #666; }

  .mode-badge {
    font-size: 0.8rem; padding: 4px 12px;
    border-radius: 20px; font-weight: bold; margin-bottom: 4px;
  }
  .mode-badge.practice { background: #00b894; color: #fff; }
  .mode-badge.ranked { background: #e94560; color: #fff; }

  /* 게임오버 */
  .gameover-screen h1 { color: #e94560; font-size: 2.5rem; }
  .go-streak { font-size: 3rem; font-weight: bold; color: #ffd32a; }
  .go-streak-label { font-size: 1rem; color: #888; }
  .go-answer { text-align: center; }
  .go-answer .name-reveal { font-size: 1.3rem; font-weight: bold; color: #e94560; }
  .go-answer .name-original { font-size: 0.9rem; color: #888; }
  .go-nickname { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .go-nickname input {
    font-size: 1.1rem; padding: 10px 16px;
    border-radius: 8px; border: 2px solid #0f3460;
    background: #16213e; color: #eee;
    outline: none; width: 200px; text-align: center;
  }
  .go-nickname input:focus { border-color: #e94560; }
  .btn-save-score {
    background: #ffd32a; color: #1a1a2e;
    font-size: 1.1rem; padding: 12px 32px; border-radius: 12px;
  }
  .btn-save-score:disabled { background: #555; color: #888; cursor: not-allowed; }

  /* 리더보드 */
  .leaderboard { width: 100%; max-width: 400px; }
  .leaderboard table { width: 100%; border-collapse: collapse; }
  .leaderboard th {
    font-size: 0.8rem; color: #666; padding: 6px 8px;
    text-align: center; border-bottom: 1px solid #333;
  }
  .leaderboard td {
    font-size: 0.9rem; padding: 6px 8px;
    text-align: center; border-bottom: 1px solid #222;
  }
  .leaderboard tr.me td { color: #ffd32a; font-weight: bold; }
  .leaderboard .rank-1 td:first-child { color: #ffd700; }
  .leaderboard .rank-2 td:first-child { color: #c0c0c0; }
  .leaderboard .rank-3 td:first-child { color: #cd7f32; }
  .lb-empty { color: #555; font-size: 0.9rem; text-align: center; padding: 16px; }
</style>
</head>
<body>

<!-- 1. 메인 화면 -->
<div class="screen active" id="mainScreen">
  <div class="main-hero">
    <h1>엄켓몬 실루엣 퀴즈</h1>
    <p class="main-sub">게임 모드를 선택하세요</p>
  </div>

  <div class="main-buttons">
    <button class="btn-mode practice" onclick="goToSettings('practice')">
      연습모드
      <div class="mode-desc">힌트 / 스킵 / 무제한</div>
    </button>
    <button class="btn-mode ranked" onclick="goToRankedSettings()">
      랭크모드
      <div class="mode-desc">전 세대 / 15초 제한 / 1틀 게임오버</div>
    </button>
  </div>

  <div class="main-leaderboard">
    <h2>랭크 리더보드</h2>
    <div class="lb-tabs">
      <button class="lb-tab active" data-quiz="pixelate" onclick="switchLbTab('pixelate')">픽셀화</button>
      <button class="lb-tab" data-quiz="silhouette" onclick="switchLbTab('silhouette')">실루엣</button>
    </div>
    <div class="leaderboard" id="leaderboard">
      <p class="lb-empty">로딩 중...</p>
    </div>
  </div>
</div>

<!-- 2. 설정 화면 -->
<div class="screen" id="selectScreen">
  <h1 id="settingsTitle">연습모드</h1>
  <h2>원하는 세대를 선택하세요</h2>

  <div class="gen-grid" id="genGrid"></div>

  <div class="select-actions">
    <button class="btn-select-all" onclick="toggleAll()">전체 선택/해제</button>
  </div>

  <h2>퀴즈 모드</h2>
  <div class="mode-select">
    <div class="mode-btn active" data-mode="pixelate" onclick="selectQuizMode('pixelate')">픽셀화</div>
    <div class="mode-btn" data-mode="silhouette" onclick="selectQuizMode('silhouette')">실루엣</div>
  </div>

  <button class="btn-start" id="startBtn" onclick="startGame()" disabled>시작하기</button>
  <button class="btn-back" onclick="goToMain()">뒤로가기</button>
</div>

<!-- 2-2. 랭크 설정 화면 (퀴즈모드만) -->
<div class="screen" id="rankedSelectScreen">
  <h1 style="color:#e94560">랭크모드</h1>
  <h2 style="font-size:1rem; color:#888">전 세대 (1~9세대) 포함</h2>

  <h2>퀴즈 모드</h2>
  <div class="mode-select">
    <div class="mode-btn active" data-rmode="pixelate" onclick="selectRankedQuizMode('pixelate')">픽셀화</div>
    <div class="mode-btn" data-rmode="silhouette" onclick="selectRankedQuizMode('silhouette')">실루엣</div>
  </div>

  <button class="btn-start ranked-start" onclick="startRankedGame()">시작하기</button>
  <button class="btn-back" onclick="goToMain()">뒤로가기</button>
</div>

<!-- 3. 게임 화면 -->
<div class="screen" id="gameScreen">
  <span class="mode-badge" id="modeBadge"></span>
  <h1>엄켓몬 퀴즈</h1>
  <p class="score">
    연속 정답: <span id="streak">0</span> | 최대 연속: <span id="best">0</span> | 총 정답: <span id="total">0</span>
    <span class="gen-info" id="genInfo"></span>
  </p>

  <div class="game-area">
    <div class="timer-text" id="timerText">15.0초</div>
    <div class="timer-bar" id="timerBar">
      <div class="timer-fill" id="timerFill"></div>
    </div>

    <div class="image-container" id="imageContainer">
      <canvas id="canvas"></canvas>
      <img id="originalImg" crossorigin="anonymous">
      <span class="loading" id="loadingText">로딩 중...</span>
    </div>

    <div class="result" id="resultArea"></div>

    <div class="input-area" id="inputArea">
      <input type="text" id="answerInput" placeholder="엄켓몬 이름 입력" autocomplete="off">
      <button class="btn-submit" id="submitBtn">확인</button>
    </div>

    <div class="buttons-row" id="buttonsRow"></div>
    <button class="btn-back" onclick="backToMain()">메뉴로 돌아가기</button>
  </div>
</div>

<!-- 4. 게임오버 화면 -->
<div class="screen gameover-screen" id="gameoverScreen">
  <h1>GAME OVER</h1>
  <div class="go-streak-label">연속 정답</div>
  <div class="go-streak" id="goStreak">0</div>
  <div class="go-answer" id="goAnswer"></div>
  <div class="go-nickname">
    <input type="text" id="goNicknameInput" placeholder="닉네임 입력" maxlength="10">
    <button class="btn-save-score" id="goSaveBtn" onclick="saveAndReturn()">기록 저장</button>
  </div>
  <button class="btn-back" onclick="goToMain()">메뉴로 돌아가기</button>
</div>

<script>
const API_BASE = "https://pokeapi.co/api/v2";
const ARTWORK_BASE = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork";

const GENERATIONS = [
  { gen: 1, label: "1세대", sub: "관동", start: 1, end: 151 },
  { gen: 2, label: "2세대", sub: "성도", start: 152, end: 251 },
  { gen: 3, label: "3세대", sub: "호연", start: 252, end: 386 },
  { gen: 4, label: "4세대", sub: "신오", start: 387, end: 493 },
  { gen: 5, label: "5세대", sub: "하나", start: 494, end: 649 },
  { gen: 6, label: "6세대", sub: "칼로스", start: 650, end: 721 },
  { gen: 7, label: "7세대", sub: "알로라", start: 722, end: 809 },
  { gen: 8, label: "8세대", sub: "가라르", start: 810, end: 905 },
  { gen: 9, label: "9세대", sub: "팔데아", start: 906, end: 1025 },
];

let selectedGens = new Set();
let allowedIds = [];
let currentPokemon = null;
let streak = 0, total = 0, bestStreak = 0;
let hintUsed = false, waitingNext = false;
let preloaded = null;
let revealTimer = null, originalPixels = null, opaqueCoords = [];
const REVEAL_INTERVAL = 3000, REVEAL_STEPS = 10;
let revealStep = 0;

let SILHOUETTE_MODE = "pixelate";
const PIXEL_BLOCK_START = 40, PIXEL_BLOCK_END = 1;

let gameMode = "practice";
const RANKED_TIME = 15;
let roundTimerInterval = null, timeLeft = RANKED_TIME;

let currentLbTab = "pixelate";

// ── 화면 전환 ──
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goToSettings(mode) {
  gameMode = mode;
  document.getElementById("settingsTitle").textContent = "연습모드";
  document.getElementById("settingsTitle").style.color = "#00b894";
  document.getElementById("startBtn").className = "btn-start";
  showScreen("selectScreen");
}

function goToRankedSettings() {
  gameMode = "ranked";
  showScreen("rankedSelectScreen");
}

function selectRankedQuizMode(mode) {
  SILHOUETTE_MODE = mode;
  document.querySelectorAll("[data-rmode]").forEach(b => {
    b.classList.toggle("active", b.dataset.rmode === mode);
  });
}

function startRankedGame() {
  // 전 세대 자동 포함
  allowedIds = [];
  for (const g of GENERATIONS) {
    for (let i = g.start; i <= g.end; i++) allowedIds.push(i);
  }

  document.getElementById("genInfo").textContent = "| 전 세대";

  const badge = document.getElementById("modeBadge");
  badge.textContent = "랭크모드";
  badge.className = "mode-badge ranked";

  streak = 0; total = 0; bestStreak = 0;
  document.getElementById("streak").textContent = 0;
  document.getElementById("best").textContent = 0;
  document.getElementById("total").textContent = 0;

  showScreen("gameScreen");
  newRound();
}

function goToMain() {
  hideTimer();
  stopReveal();
  showScreen("mainScreen");
}

function backToMain() {
  hideTimer();
  stopReveal();
  showScreen("mainScreen");
}

// ── 세대 선택 ──
function initGenGrid() {
  const grid = document.getElementById("genGrid");
  for (const g of GENERATIONS) {
    const btn = document.createElement("div");
    btn.className = "gen-btn";
    btn.dataset.gen = g.gen;
    btn.innerHTML = `${g.label}<div class="gen-range">${g.sub} (#${g.start}~${g.end})</div>`;
    btn.addEventListener("click", () => toggleGen(g.gen, btn));
    grid.appendChild(btn);
  }
}

function toggleGen(gen, btn) {
  if (selectedGens.has(gen)) { selectedGens.delete(gen); btn.classList.remove("active"); }
  else { selectedGens.add(gen); btn.classList.add("active"); }
  document.getElementById("startBtn").disabled = selectedGens.size === 0;
}

function toggleAll() {
  const allSelected = selectedGens.size === GENERATIONS.length;
  const btns = document.querySelectorAll(".gen-btn");
  if (allSelected) { selectedGens.clear(); btns.forEach(b => b.classList.remove("active")); }
  else { GENERATIONS.forEach(g => selectedGens.add(g.gen)); btns.forEach(b => b.classList.add("active")); }
  document.getElementById("startBtn").disabled = selectedGens.size === 0;
}

function selectQuizMode(mode) {
  SILHOUETTE_MODE = mode;
  document.querySelectorAll(".mode-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.mode === mode);
  });
}

// ── 타이머 ──
function startRoundTimer() {
  timeLeft = RANKED_TIME;
  const timerBar = document.getElementById("timerBar");
  const timerFill = document.getElementById("timerFill");
  const timerText = document.getElementById("timerText");
  timerBar.style.display = "block";
  timerText.style.display = "block";
  timerFill.style.width = "100%";
  timerFill.classList.remove("danger");
  timerText.textContent = RANKED_TIME.toFixed(1) + "초";

  roundTimerInterval = setInterval(() => {
    timeLeft -= 0.1;
    if (timeLeft <= 0) { timeLeft = 0; stopRoundTimer(); gameOver("timeout"); }
    const pct = (timeLeft / RANKED_TIME) * 100;
    timerFill.style.width = pct + "%";
    timerText.textContent = timeLeft.toFixed(1) + "초";
    if (timeLeft <= 5) timerFill.classList.add("danger");
  }, 100);
}

function stopRoundTimer() {
  if (roundTimerInterval) { clearInterval(roundTimerInterval); roundTimerInterval = null; }
}

function hideTimer() {
  stopRoundTimer();
  document.getElementById("timerBar").style.display = "none";
  document.getElementById("timerText").style.display = "none";
}

// ── 게임 시작 ──
function startGame() {
  allowedIds = [];
  for (const g of GENERATIONS) {
    if (selectedGens.has(g.gen)) {
      for (let i = g.start; i <= g.end; i++) allowedIds.push(i);
    }
  }

  const genLabels = GENERATIONS.filter(g => selectedGens.has(g.gen)).map(g => g.label).join(", ");
  document.getElementById("genInfo").textContent = `| ${genLabels}`;

  const badge = document.getElementById("modeBadge");
  if (gameMode === "ranked") {
    badge.textContent = "랭크모드";
    badge.className = "mode-badge ranked";
  } else {
    badge.textContent = "연습모드";
    badge.className = "mode-badge practice";
  }

  streak = 0; total = 0; bestStreak = 0;
  document.getElementById("streak").textContent = 0;
  document.getElementById("best").textContent = 0;
  document.getElementById("total").textContent = 0;

  showScreen("gameScreen");
  newRound();
}

// ── 엄켓몬 변환 ──
function toUmkemon(name) {
  const first = name[0];
  let count = 1;
  while (count < name.length && name[count] === first) count++;
  return "엄".repeat(count) + name.slice(count);
}

function isKorean(ch) { return ch >= "\uac00" && ch <= "\ud7a3"; }

function startsWithPokemonName(word, nameSet) {
  for (const name of nameSet) { if (word.startsWith(name)) return true; }
  return false;
}

function umkemonWord(word, nameSet) {
  if (!word || !isKorean(word[0])) return word;
  let koreanLen = 0;
  for (const c of word) { if (isKorean(c)) koreanLen++; }
  if (startsWithPokemonName(word, nameSet) || koreanLen >= 4) return "엄" + word.slice(1);
  return word;
}

function umkemonText(text, nameSet) {
  return text.replace(/\f/g, "\n").split("\n").map(line =>
    line.split(" ").map(w => umkemonWord(w, nameSet)).join(" ")
  ).join(" ").trim();
}

const koNameCache = new Set();

async function fetchRandomPokemon() {
  const id = allowedIds[Math.floor(Math.random() * allowedIds.length)];
  const [speciesRes, pokemonRes] = await Promise.all([
    fetch(`${API_BASE}/pokemon-species/${id}`).then(r => r.json()),
    fetch(`${API_BASE}/pokemon/${id}`).then(r => r.json()),
  ]);

  let koName = null;
  for (const entry of speciesRes.names) {
    if (entry.language.name === "ko") { koName = entry.name; break; }
  }
  if (!koName) return fetchRandomPokemon();

  koNameCache.add(koName);

  let koFlavor = null;
  for (const entry of speciesRes.flavor_text_entries) {
    if (entry.language.name !== "ko") continue;
    if (entry.version.name === "x") { koFlavor = entry.flavor_text; break; }
    koFlavor = entry.flavor_text;
  }

  const types = pokemonRes.types.map(t => {
    const m = {
      normal:"노말", fire:"불꽃", water:"물", electric:"전기",
      grass:"풀", ice:"얼음", fighting:"격투", poison:"독",
      ground:"땅", flying:"비행", psychic:"에스퍼", bug:"벌레",
      rock:"바위", ghost:"고스트", dragon:"드래곤", dark:"악",
      steel:"강철", fairy:"페어리",
    };
    return m[t.type.name] || t.type.name;
  });

  return { id, koName, umName: toUmkemon(koName), types, koFlavor };
}

function preloadNext() {
  preloaded = null;
  fetchRandomPokemon().then(pokemon => {
    const url = `${ARTWORK_BASE}/${pokemon.id}.png`;
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => { preloaded = { pokemon, img }; };
    img.onerror = () => { preloadNext(); };
    img.src = url;
  });
}

// ── 캔버스 / 실루엣 / 픽셀화 ──
function initCanvas(img) {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
  ctx.drawImage(img, 0, 0);
  originalPixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data.slice();
  opaqueCoords = [];
  for (let y = 0; y < canvas.height; y++)
    for (let x = 0; x < canvas.width; x++)
      if (originalPixels[(y * canvas.width + x) * 4 + 3] > 0) opaqueCoords.push([x, y]);
  return { canvas, ctx };
}

const silhouetteMode = {
  draw(img) {
    const { canvas, ctx } = initCanvas(img);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    for (let i = 0; i < data.length; i += 4)
      if (data[i+3] > 0) { data[i]=0; data[i+1]=0; data[i+2]=0; data[i+3]=255; }
    ctx.putImageData(imageData, 0, 0);
  },
  reveal() {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const w = canvas.width, h = canvas.height;
    const imageData = ctx.getImageData(0, 0, w, h);
    const data = imageData.data;
    const [cx, cy] = opaqueCoords[Math.floor(Math.random() * opaqueCoords.length)];
    const r = Math.floor(Math.min(w, h) * 0.15);
    for (let y = Math.max(0, cy-r); y < Math.min(h, cy+r); y++)
      for (let x = Math.max(0, cx-r); x < Math.min(w, cx+r); x++)
        if ((x-cx)**2 + (y-cy)**2 <= r*r) {
          const i = (y*w+x)*4;
          if (originalPixels[i+3] > 0) { data[i]=originalPixels[i]; data[i+1]=originalPixels[i+1]; data[i+2]=originalPixels[i+2]; data[i+3]=255; }
        }
    ctx.putImageData(imageData, 0, 0);
  }
};

const pixelateMode = {
  draw(img) { const { canvas, ctx } = initCanvas(img); this._dp(canvas, ctx, PIXEL_BLOCK_START); },
  reveal() {
    const canvas = document.getElementById("canvas"), ctx = canvas.getContext("2d");
    const t = revealStep / REVEAL_STEPS;
    this._dp(canvas, ctx, Math.max(Math.round(PIXEL_BLOCK_START*(1-t) + PIXEL_BLOCK_END*t), 1));
  },
  _dp(canvas, ctx, bs) {
    const w = canvas.width, h = canvas.height;
    const imageData = ctx.getImageData(0, 0, w, h), data = imageData.data;
    for (let by = 0; by < h; by += bs) for (let bx = 0; bx < w; bx += bs) {
      let r=0,g=0,b=0,a=0,c=0;
      for (let y=by; y<Math.min(by+bs,h); y++) for (let x=bx; x<Math.min(bx+bs,w); x++) {
        const i=(y*w+x)*4; r+=originalPixels[i]; g+=originalPixels[i+1]; b+=originalPixels[i+2]; a+=originalPixels[i+3]; c++;
      }
      r=Math.round(r/c); g=Math.round(g/c); b=Math.round(b/c); a=Math.round(a/c);
      for (let y=by; y<Math.min(by+bs,h); y++) for (let x=bx; x<Math.min(bx+bs,w); x++) {
        const i=(y*w+x)*4; data[i]=r; data[i+1]=g; data[i+2]=b; data[i+3]=a;
      }
    }
    ctx.putImageData(imageData, 0, 0);
  }
};

const MODES = { silhouette: silhouetteMode, pixelate: pixelateMode };

function drawSilhouette(img) {
  MODES[SILHOUETTE_MODE].draw(img);
  revealStep = 0;
  if (revealTimer) clearInterval(revealTimer);
  revealTimer = setInterval(revealOneStep, REVEAL_INTERVAL);
}

function revealOneStep() {
  revealStep++;
  if (revealStep >= REVEAL_STEPS) { clearInterval(revealTimer); revealTimer = null; }
  MODES[SILHOUETTE_MODE].reveal();
}

function stopReveal() { if (revealTimer) { clearInterval(revealTimer); revealTimer = null; } }

function showOriginal() {
  stopReveal();
  document.getElementById("canvas").style.display = "none";
  document.getElementById("originalImg").style.display = "block";
}

// ── 라운드 ──
async function newRound() {
  const loading = document.getElementById("loadingText");
  const canvas = document.getElementById("canvas");
  const originalImg = document.getElementById("originalImg");
  const resultArea = document.getElementById("resultArea");
  const inputArea = document.getElementById("inputArea");
  const buttonsRow = document.getElementById("buttonsRow");
  const answerInput = document.getElementById("answerInput");

  stopReveal(); hideTimer();
  canvas.style.display = "none"; originalImg.style.display = "none";
  loading.style.display = "block"; resultArea.innerHTML = "";
  inputArea.style.display = "flex";
  answerInput.value = ""; answerInput.disabled = false;
  document.getElementById("submitBtn").disabled = false;
  hintUsed = false; waitingNext = false;

  if (gameMode === "practice") {
    buttonsRow.innerHTML = `
      <button class="btn-hint" onclick="showHint()">힌트 (Ctrl+1)</button>
      <button class="btn-skip" onclick="skip()">스킵 (Ctrl+2)</button>
    `;
  } else { buttonsRow.innerHTML = ""; }

  const onReady = (pokemon, img) => {
    currentPokemon = pokemon;
    loading.style.display = "none"; canvas.style.display = "block";
    drawSilhouette(img);
    originalImg.src = `${ARTWORK_BASE}/${currentPokemon.id}.png`;
    answerInput.focus();
    if (gameMode === "ranked") startRoundTimer();
  };

  if (preloaded) { const { pokemon, img } = preloaded; preloaded = null; onReady(pokemon, img); }
  else {
    currentPokemon = await fetchRandomPokemon();
    const url = `${ARTWORK_BASE}/${currentPokemon.id}.png`;
    const img = new Image(); img.crossOrigin = "anonymous";
    img.onload = () => onReady(currentPokemon, img);
    img.onerror = () => newRound();
    img.src = url;
  }
}

// ── 정답 체크 ──
function checkAnswer() {
  if (waitingNext) return;
  const input = document.getElementById("answerInput");
  const answer = input.value.trim();
  if (!answer) return;

  const strip = s => s.replace(/[♂♀]/g, "");
  const isCorrect = answer === currentPokemon.umName || answer === strip(currentPokemon.umName);

  if (isCorrect) {
    stopRoundTimer(); streak++; total++;
    if (streak > bestStreak) { bestStreak = streak; document.getElementById("best").textContent = bestStreak; }
    document.getElementById("streak").textContent = streak;
    document.getElementById("total").textContent = total;

    showOriginal();
    document.getElementById("resultArea").innerHTML = `
      <span class="name-reveal">${currentPokemon.umName}</span>
      <span class="name-original">(${currentPokemon.koName})</span>
      ${buildFlavorHtml()}
    `;
    document.getElementById("inputArea").style.display = "none";
    document.getElementById("buttonsRow").innerHTML = `
      <button class="btn-next" onclick="newRound()">다음 엄켓몬 (Enter)</button>
    `;
    waitingNext = true; preloadNext();
  } else {
    if (gameMode === "ranked") { gameOver("wrong"); }
    else {
      streak = 0; document.getElementById("streak").textContent = streak;
      input.classList.add("wrong"); setTimeout(() => input.classList.remove("wrong"), 400);
    }
  }
}

function showHint() {
  if (gameMode === "ranked" || !currentPokemon || hintUsed) return;
  hintUsed = true;
  const typeStr = currentPokemon.types.join(" / ");
  document.getElementById("resultArea").innerHTML = `
    <span class="hint-text">타입: ${typeStr}</span>
    <span class="hint-text">글자 수: ${currentPokemon.umName.length}글자 | 첫 글자: ${currentPokemon.umName[0]}</span>
  `;
}

function skip() {
  if (gameMode === "ranked") return;
  streak = 0; document.getElementById("streak").textContent = streak;
  showOriginal();
  document.getElementById("resultArea").innerHTML = `
    <span class="name-reveal">${currentPokemon.umName}</span>
    <span class="name-original">(${currentPokemon.koName})</span>
    ${buildFlavorHtml()}
  `;
  document.getElementById("inputArea").style.display = "none";
  document.getElementById("buttonsRow").innerHTML = `
    <button class="btn-next" onclick="newRound()">다음 엄켓몬 (Enter)</button>
  `;
  waitingNext = true; preloadNext();
}

function gameOver(reason) {
  stopRoundTimer(); stopReveal();
  const reasonText = reason === "timeout" ? "시간 초과!" : "오답!";
  document.getElementById("goStreak").textContent = streak;
  document.getElementById("goAnswer").innerHTML = `
    <div style="color:#888; font-size:0.9rem; margin-bottom:4px">${reasonText}</div>
    <div>정답: <span class="name-reveal">${currentPokemon.umName}</span>
    <span class="name-original">(${currentPokemon.koName})</span></div>
  `;
  const goInput = document.getElementById("goNicknameInput");
  goInput.value = localStorage.getItem("umkemon_nickname") || "";
  document.getElementById("goSaveBtn").disabled = false;
  document.getElementById("goSaveBtn").textContent = "기록 저장";
  showScreen("gameoverScreen");
}

function buildFlavorHtml() {
  if (!currentPokemon.koFlavor) return "";
  return `<div class="flavor-box"><div class="flavor-um">${umkemonText(currentPokemon.koFlavor, koNameCache)}</div></div>`;
}

// ── 키보드 이벤트 ──
document.getElementById("submitBtn").addEventListener("click", checkAnswer);
document.addEventListener("keydown", (e) => {
  if (document.getElementById("gameoverScreen").classList.contains("active")) {
    if (e.key === "Enter") saveAndReturn();
    return;
  }
  if (!document.getElementById("gameScreen").classList.contains("active")) return;
  if (e.key === "Enter") { if (waitingNext) newRound(); else checkAnswer(); }
  else if (e.key === "1" && e.ctrlKey && gameMode === "practice") { e.preventDefault(); showHint(); }
  else if (e.key === "2" && e.ctrlKey && gameMode === "practice") { e.preventDefault(); skip(); }
});

initGenGrid();
</script>

// ── 리더보드 탭 전환 ──
function switchLbTab(quizMode) {
  currentLbTab = quizMode;
  document.querySelectorAll(".lb-tab").forEach(t => {
    t.classList.toggle("active", t.dataset.quiz === quizMode);
  });
  loadLeaderboard();
}

// ── 점수 저장 (퀴즈 모드 포함) ──
function saveScore(nickname, streakVal) {
  if (streakVal <= 0) return Promise.resolve();
  return db.ref("scores").push({
    name: nickname,
    streak: streakVal,
    quizMode: SILHOUETTE_MODE,
    ts: Date.now()
  });
}

function saveAndReturn() {
  const btn = document.getElementById("goSaveBtn");
  if (btn.disabled) return;
  const nickname = document.getElementById("goNicknameInput").value.trim() || "익명";
  localStorage.setItem("umkemon_nickname", nickname);
  btn.disabled = true; btn.textContent = "저장 중...";
  saveScore(nickname, streak).then(() => {
    btn.textContent = "저장 완료!";
    setTimeout(() => goToMain(), 800);
  });
}

// ── 리더보드 로드 (퀴즈 모드별 필터) ──
function loadLeaderboard() {
  const container = document.getElementById("leaderboard");
  db.ref("scores").orderByChild("streak").limitToLast(50).once("value", snap => {
    const all = [];
    snap.forEach(child => all.push(child.val()));

    const entries = all
      .filter(e => (e.quizMode || "pixelate") === currentLbTab)
      .sort((a, b) => b.streak - a.streak)
      .slice(0, 10);

    if (entries.length === 0) {
      container.innerHTML = '<p class="lb-empty">아직 기록이 없습니다</p>';
      return;
    }

    const myName = localStorage.getItem("umkemon_nickname") || "";
    let html = '<table><tr><th>#</th><th>닉네임</th><th>연속 정답</th></tr>';
    entries.forEach((e, i) => {
      const rankClass = i < 3 ? ` rank-${i+1}` : "";
      const meClass = e.name === myName ? " me" : "";
      const medal = ["🥇","🥈","🥉"][i] || (i+1);
      html += `<tr class="${rankClass}${meClass}"><td>${medal}</td><td>${e.name}</td><td>${e.streak}</td></tr>`;
    });
    html += '</table>';
    container.innerHTML = html;
  });
}

loadLeaderboard();
</script>
